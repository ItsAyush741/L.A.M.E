<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>L.A.M.E. - Homepage</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="icon">&#9776;</span>
            <span class="brand">L.A.M.E.</span>
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Catalog</a></li>
            <li><a href="#">My Account</a></li>
        </ul>
    </nav>
    <main class="container">
        <h1>Welcome, Sarah Chen</h1>
        <p class="student-id">Student ID: <span>12345678</span></p>
        <h2>Currently Borrowed Books</h2>
        <table class="books-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Due Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>The Great Gatsby</td>
                    <td class="author-link">F. Scott Fitzgerald</td>
                    <td>2024-05-15</td>
                </tr>
                <tr>
                    <td>To Kill a Mockingbird</td>
                    <td class="author-link">Harper Lee</td>
                    <td>2024-05-22</td>
                </tr>
                <tr>
                    <td>1984</td>
                    <td class="author-link">George Orwell</td>
                    <td>2024-05-29</td>
                </tr>
            </tbody>
        </table>
        <div class="action-buttons">
            <button class="borrow-btn">Borrow Book</button>
            <button class="return-btn">Return Book</button>
        </div>
    </main>
</body>
</html>
